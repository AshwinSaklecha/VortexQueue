version: "3.9"

# For local dev: use backend/.env directly (localhost URLs work fine)
# For Docker: DATABASE_URL and REDIS_URL are overridden per-service below
#             so containers reach each other by service name, not localhost.

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your shell or a root .env file}
      POSTGRES_DB: job_queue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      # Override the localhost URLs from .env — inside Docker, service names are the hostnames
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/job_queue_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: python -m src.worker.main
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/job_queue_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Scale horizontally: docker compose up --scale worker=3
    # Each replica gets a unique WORKER_ID from hostname+pid automatically

  janitor:
    build:
      context: ./backend
    command: python -m src.janitor.main
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/job_queue_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
